<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💕 Скучаешь? 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fda4af 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Falling hearts background */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            top: -10%;
            font-size: 20px;
            animation: fall linear infinite;
            opacity: 0.6;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 20px;
        }

        /* Circles */
        .circles-wrapper {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        .circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.3), 0 0 20px rgba(255, 105, 135, 0.3);
            background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        .circle:nth-child(1) {
            animation: float1 3s ease-in-out infinite;
        }

        .circle:nth-child(2) {
            animation: float2 3.5s ease-in-out infinite;
        }

        .circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes float1 {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-10px) translateX(5px); }
            50% { transform: translateY(-5px) translateX(-3px); }
            75% { transform: translateY(-12px) translateX(2px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-8px) translateX(-5px); }
            50% { transform: translateY(-14px) translateX(4px); }
            75% { transform: translateY(-6px) translateX(-2px); }
        }

        /* Heart between circles */
        .heart-between {
            font-size: 30px;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        /* Text */
        .question-text {
            color: white;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.15);
            line-height: 1.4;
            max-width: 350px;
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            0% { text-shadow: 0 2px 10px rgba(0, 0, 0, 0.15); }
            100% { text-shadow: 0 2px 20px rgba(255, 255, 255, 0.5), 0 0 30px rgba(255, 105, 180, 0.3); }
        }

        /* Buttons */
        .buttons-wrapper {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            touch-action: manipulation;
        }

        .btn-yes {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(67, 233, 123, 0.4);
        }

        .btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(67, 233, 123, 0.6);
        }

        .btn-yes:active {
            transform: scale(0.95);
        }

        .btn-no {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
            position: relative;
            z-index: 10;
        }

        .btn-no.running {
            position: fixed;
            transition: none;
        }

        .btn-no.shake {
            animation: shake 0.5s ease-in-out;
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%) !important;
            box-shadow: 0 6px 30px rgba(255, 8, 68, 0.6) !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            10% { transform: translateX(-8px) rotate(-5deg); }
            20% { transform: translateX(8px) rotate(5deg); }
            30% { transform: translateX(-8px) rotate(-3deg); }
            40% { transform: translateX(8px) rotate(3deg); }
            50% { transform: translateX(-5px) rotate(-2deg); }
            60% { transform: translateX(5px) rotate(2deg); }
            70% { transform: translateX(-3px) rotate(-1deg); }
            80% { transform: translateX(3px) rotate(1deg); }
            90% { transform: translateX(-1px) rotate(0); }
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 30px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: modalIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90vw;
            position: relative;
        }

        @keyframes modalIn {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .modal-emoji {
            font-size: 80px;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .modal-text {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 15px;
        }

        .modal-subtext {
            font-size: 16px;
            color: #999;
            margin-top: 10px;
        }

        .modal-hearts {
            font-size: 24px;
            margin-top: 15px;
            animation: pulse 1s ease-in-out infinite;
        }

        .modal-close {
            margin-top: 25px;
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff9a9e, #fda4af);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .modal-close:hover {
            transform: scale(1.05);
        }

        /* Sparkle effect on YES */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            font-size: 24px;
            animation: sparkleAnim 1s ease-out forwards;
        }

        @keyframes sparkleAnim {
            0% { transform: scale(0) rotate(0); opacity: 1; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 400px) {
            .circle {
                width: 95px;
                height: 95px;
            }
            .circle:nth-child(1) span, .circle:nth-child(2) span {
                font-size: 40px;
            }
            .question-text {
                font-size: 18px;
            }
            .btn {
                padding: 12px 30px;
                font-size: 16px;
            }
            .modal {
                padding: 30px 35px;
            }
            .modal-emoji {
                font-size: 60px;
            }
            .modal-text {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

<!-- Falling hearts -->
<div class="hearts-container" id="heartsContainer"></div>

<!-- Main content -->
<div class="content">
    <div class="circles-wrapper">
        <div class="circle">
            <span>
                <img src="ya.jpeg">
            </span>
        </div>
        <div class="heart-between">❤️</div>
        <div class="circle">
            <span>
                <img src="nastusha.jpeg">
            </span>
        </div>
    </div>

    <p class="question-text">признавайся, скучаешь по мне??? 💕</p>

    <div class="buttons-wrapper">
        <button class="btn btn-yes" id="btnYes" onclick="sayYes()">ДА 💚</button>
        <button class="btn btn-no" id="btnNo">НЕТ 💜</button>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-emoji">🥰</div>
        <div class="modal-text">и я!!!</div>
        <div class="modal-subtext">так и знал 💋</div>
        <div class="modal-hearts">💖💗💝💘💕</div>
        <button class="modal-close" onclick="closeModal()">💋</button>
    </div>
</div>

<script>
    // Create falling hearts
    function createHearts() {
        const container = document.getElementById('heartsContainer');
        const heartSymbols = ['💕', '💖', '💗', '❤️', '💘', '💝', '♥️', '💞', '🩷'];

        for (let i = 0; i < 25; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 20 + 12) + 'px';
            heart.style.animationDuration = (Math.random() * 6 + 5) + 's';
            heart.style.animationDelay = (Math.random() * 10) + 's';
            heart.style.opacity = Math.random() * 0.5 + 0.3;
            container.appendChild(heart);
        }
    }
    createHearts();

    // NO button logic
    const btnNo = document.getElementById('btnNo');
    let noEscapeCount = 0;

    function runAway() {
        noEscapeCount++;
        const btn = btnNo;

        // Add shake and red glow
        btn.classList.add('shake');
        setTimeout(() => btn.classList.remove('shake'), 500);

        // Make it fixed position and jump
        btn.classList.add('running');

        const maxX = window.innerWidth - btn.offsetWidth - 20;
        const maxY = window.innerHeight - btn.offsetHeight - 20;

        const newX = Math.random() * maxX;
        const newY = Math.random() * maxY;

        btn.style.left = newX + 'px';
        btn.style.top = newY + 'px';

        // Change text based on attempts
        const texts = ['НЕТ 💜', 'куда?', 'не дури! 😤', 'НЕТ?!', 'ну дааа!', 'пробуй пробуй 😜', '🏃💨', 'хахахахх', 'не поймаешь!!!', '❌❌❌'];
        btn.textContent = texts[Math.min(noEscapeCount, texts.length - 1)];

        // Make YES button bigger over time
        const btnYes = document.getElementById('btnYes');
        const scale = 1 + noEscapeCount * 0.08;
        btnYes.style.transform = `scale(${Math.min(scale, 1.8)})`;
    }

    // Mouse hover
    btnNo.addEventListener('mouseenter', function(e) {
        runAway();
    });

    // Touch support
    btnNo.addEventListener('touchstart', function(e) {
        e.preventDefault();
        runAway();
    }, { passive: false });

    // Click as backup
    btnNo.addEventListener('click', function(e) {
        e.preventDefault();
        runAway();
    });

    // YES button
    function sayYes() {
        // Sparkle effect
        for (let i = 0; i < 12; i++) {
            setTimeout(() => {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.textContent = ['✨', '💖', '⭐', '💕', '🌟', '💗'][Math.floor(Math.random() * 6)];
                sparkle.style.left = Math.random() * 100 + 'vw';
                sparkle.style.top = Math.random() * 100 + 'vh';
                sparkle.style.fontSize = (Math.random() * 30 + 20) + 'px';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1000);
            }, i * 100);
        }

        // Show modal
        setTimeout(() => {
            document.getElementById('modal').classList.add('active');
        }, 300);
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');

        // Reset NO button
        btnNo.classList.remove('running');
        btnNo.style.left = '';
        btnNo.style.top = '';
        btnNo.textContent = 'НЕТ 💜';
        noEscapeCount = 0;

        document.getElementById('btnYes').style.transform = '';
    }

    // Close modal on overlay click
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
</script>
</body>
</html>
